<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Lokkygoat / Goatky</title>
  <style>
    :root {
      --glow-color: rgba(236, 72, 153, 0.92);
      --ring1-color: #7e22ce;
      --ring2-color: #a855f7;
      --ring3-color: #ec4899;
      --core-stroke: #ec4899;
      --core-fill: rgba(88, 28, 135, 0.42);
      --face-color: #fdf4ff;
      --plate-edge: #3b1f57;
      --pet-scale: 1;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      -webkit-app-region: no-drag;
    }

    #wrap {
      position: relative;
      width: 240px;
      height: 240px;
      display: grid;
      place-items: center;
      overflow: visible;
    }

    #bubble {
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 210px;
      padding: 8px 12px;
      border-radius: 15px;
      background: rgba(5, 5, 8, 0.94);
      border: 1px solid rgba(236, 72, 153, 0.58);
      color: #fce7f3;
      font-size: 11px;
      line-height: 1.25;
      text-align: center;
      box-shadow: 0 0 18px rgba(236, 72, 153, 0.22), 0 12px 28px rgba(0, 0, 0, 0.72);
      z-index: 7;
      pointer-events: none;
      text-shadow: 0 0 9px rgba(236, 72, 153, 0.68);
    }

    #bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: rgba(5, 5, 8, 0.94);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
    }

    #canvas-fx {
      position: absolute;
      top: 0;
      left: 0;
      width: 240px;
      height: 240px;
      pointer-events: none;
      z-index: 1;
    }

    #pet-float-container {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      pointer-events: none;
      transform-origin: 50% 50%;
    }

    #pet {
      width: calc(178px * var(--pet-scale, 1));
      height: calc(178px * var(--pet-scale, 1));
      margin-top: 34px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      z-index: 3;
      pointer-events: auto;
      transform-origin: 50% 74%;
      transition: filter 0.25s ease, transform 0.08s linear;
      filter: drop-shadow(0 0 10px rgba(236, 72, 153, 0.95)) drop-shadow(0 0 28px rgba(126, 34, 206, 0.62));
    }

    #pet:hover {
      filter: drop-shadow(0 0 16px rgba(236, 72, 153, 1)) drop-shadow(0 0 42px rgba(168, 85, 247, 0.86));
    }

    svg { width: 100%; height: 100%; overflow: visible; }

    .hud-ring-outer, .hud-ring-mid, .hud-ring-inner {
      fill: none;
      transform-origin: 110px 110px;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .hud-ring-outer { stroke: var(--ring3-color); stroke-width: 2; stroke-dasharray: 10 18; opacity: .78; animation: spin 18s linear infinite; }
    .hud-ring-mid { stroke: var(--ring2-color); stroke-width: 3.5; stroke-dasharray: 34 22; opacity: .72; animation: spinReverse 15s linear infinite; }
    .hud-ring-inner { stroke: var(--ring1-color); stroke-width: 2; stroke-dasharray: 20 15; opacity: .56; animation: spin 10s linear infinite; }

    .spark {
      fill: var(--ring3-color);
      opacity: .7;
      filter: drop-shadow(0 0 8px var(--ring3-color));
      animation: sparkBlink 2.6s ease-in-out infinite;
    }

    .plate {
      fill: url(#plateGradient);
      stroke: var(--plate-edge);
      stroke-width: 2.5;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 5px rgba(236, 72, 153, 0.28));
    }

    .dark-plate {
      fill: #080714;
      stroke: #2e1748;
      stroke-width: 2;
      stroke-linejoin: round;
    }

    .neon-line {
      fill: none;
      stroke: var(--ring3-color);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px var(--ring3-color));
    }

    .horn-main {
      fill: url(#hornGradient);
      stroke: #2f1644;
      stroke-width: 2.5;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.65));
    }

    .horn-edge {
      fill: none;
      stroke: var(--ring3-color);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 7px var(--ring3-color));
    }

    .visor-shell {
      fill: #03030a;
      stroke: #402060;
      stroke-width: 3.5;
      filter: drop-shadow(0 0 6px rgba(236, 72, 153, 0.7)) drop-shadow(0 0 18px rgba(126, 34, 206, 0.42));
    }

    .visor-glass {
      fill: rgba(0, 0, 0, 0.92);
      stroke: rgba(236, 72, 153, 0.5);
      stroke-width: 1.4;
    }

    .visor-reflection {
      fill: none;
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 1.2;
      stroke-linecap: round;
    }

    .eyes-open {
      filter: drop-shadow(0 0 7px var(--ring3-color));
      transform-origin: 110px 103px;
      animation: blinkEyes 4.6s ease-in-out infinite;
    }

    .eye-shape { fill: var(--ring3-color); }

    .eyes-closed path {
      stroke: var(--ring3-color);
      stroke-width: 3;
      stroke-linecap: round;
      fill: none;
      filter: drop-shadow(0 0 7px var(--ring3-color));
    }

    #mouth-open, #mouth-closed {
      fill: none;
      stroke: var(--ring3-color);
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px var(--ring3-color));
    }

    #mouth-open { stroke-width: 3; }
    #mouth-closed { stroke-width: 2.6; }

    .core {
      fill: var(--core-fill);
      stroke: var(--core-stroke);
      stroke-width: 2.5;
      filter: drop-shadow(0 0 9px var(--core-stroke));
      animation: corePulse 2.6s ease-in-out infinite;
    }

    .goat-emblem {
      fill: none;
      stroke: var(--ring3-color);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px var(--ring3-color));
    }

    .joint {
      fill: #130b21;
      stroke: #4b2368;
      stroke-width: 1.8;
    }

    .claw, .hoof {
      fill: #05040b;
      stroke: var(--ring3-color);
      stroke-width: 1.7;
      filter: drop-shadow(0 0 5px var(--ring3-color));
    }

    .tail-line {
      fill: none;
      stroke: #1d102d;
      stroke-width: 3.2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(236, 72, 153, 0.42));
    }

    .tail-tip {
      fill: var(--ring3-color);
      filter: drop-shadow(0 0 9px var(--ring3-color));
    }

    #pet-shadow {
      fill: rgba(236, 72, 153, 0.22);
      filter: blur(2px) drop-shadow(0 0 10px rgba(236, 72, 153, 0.35));
      transform-origin: 110px 184px;
      transition: opacity .16s ease, transform .16s ease;
    }

    #goatky-character { transform-origin: 110px 118px; }
    #left-leg, #right-leg, #left-arm, #right-arm { transform-box: fill-box; }
    #left-leg { transform-origin: 50% 12%; }
    #right-leg { transform-origin: 50% 12%; }
    #left-arm { transform-origin: 80% 10%; }
    #right-arm { transform-origin: 20% 10%; }
    #goat-tail { transform-origin: 90px 148px; }

    #thruster-flame {
      opacity: 0;
      transform-origin: 110px 168px;
      fill: url(#flameGradient);
      filter: drop-shadow(0 0 10px var(--ring3-color));
      transition: opacity .16s ease;
    }

    #pet.physics-idle_grounded #goatky-character { animation: groundedBreath 3.3s ease-in-out infinite; }
    #pet.physics-grounded_walk #goatky-character { animation: walkBody 0.44s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #left-leg { animation: leftWalk 0.36s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #right-leg { animation: rightWalk 0.36s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #left-arm { animation: rightWalk 0.44s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #right-arm { animation: leftWalk 0.44s ease-in-out infinite alternate; }
    #pet.physics-hop #goatky-character { animation: hopSquash .46s ease-in-out infinite alternate; }
    #pet.physics-hop #pet-shadow { opacity: .14; transform: scaleX(.78); }
    #pet.physics-fly #goatky-character, #pet.physics-dash #goatky-character { animation: hoverGoat 1.05s ease-in-out infinite alternate; }
    #pet.physics-fly #thruster-flame, #pet.physics-dash #thruster-flame { opacity: 1; animation: thrusterFlicker .09s ease-in-out infinite alternate; }
    #pet.physics-fly #pet-shadow, #pet.physics-dash #pet-shadow { opacity: .08; transform: scaleX(.55); }
    #pet.physics-fly #goat-tail, #pet.physics-dash #goat-tail { animation: tailWhip .9s ease-in-out infinite alternate; }
    #pet.dashing { filter: brightness(1.18) drop-shadow(0 0 20px var(--ring3-color)) drop-shadow(0 0 38px rgba(168, 85, 247, .68)) !important; }
    #pet.bounce, #pet.celebrate { animation: spinOnce .9s ease-in-out 1; }
    #pet.glow-bright .core { animation: coreFlash 1.05s ease-in-out infinite; }
    #pet.portal-entering { animation: portalIn .48s cubic-bezier(.55,.055,.675,.19) 1 forwards; }
    #pet.portal-exiting { animation: portalOut .58s cubic-bezier(.215,.61,.355,1) 1 forwards; }
    #pet.scene-thinking #goatky-character, #pet.scene-executing #goatky-character { animation: cyberGlitch 2.4s steps(1) infinite; }
    #pet.scene-thinking .eye-shape, #pet.scene-error .eye-shape { fill: #ff1f8f; }
    #pet.scene-success .eye-shape { fill: #34d399; }
    #pet.scene-executing .hud-ring-mid, #pet.scene-executing .hud-ring-outer, #pet.scene-executing .hud-ring-inner { opacity: 1; stroke-width: 4; animation-duration: 1.1s; }
    #pet.scene-error { animation: alertShake .55s ease-in-out 1; }

    #mood {
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      color: #ff2e96;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 3.2px;
      text-shadow: 0 0 7px rgba(236, 72, 153, .96), 0 0 18px rgba(126, 34, 206, .76);
      pointer-events: none;
      z-index: 6;
    }

    #mood::before, #mood::after {
      content: "";
      display: inline-block;
      width: 22px;
      height: 1px;
      background: #ec4899;
      margin: 0 7px 3px;
      box-shadow: 0 0 8px #ec4899;
      opacity: .62;
    }

    #close-pet, #settings-pet {
      position: absolute;
      top: 12px;
      width: 23px;
      height: 23px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fce7f3;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 10;
      -webkit-app-region: no-drag;
      font-size: 13px;
      font-weight: 900;
      backdrop-filter: blur(6px);
    }

    #close-pet { right: 10px; background: rgba(127, 29, 29, .78); border: 1px solid rgba(248, 113, 113, .9); box-shadow: 0 0 12px rgba(239, 68, 68, .48); }
    #settings-pet { right: 40px; background: rgba(49, 18, 82, .76); border: 1px solid rgba(236, 72, 153, .76); box-shadow: 0 0 12px rgba(236, 72, 153, .42); }
    #wrap:hover #close-pet, #wrap:hover #settings-pet { opacity: 1; }
    #close-pet:hover, #settings-pet:hover { transform: scale(1.1); }

    #status-badge {
      position: absolute;
      top: 35px;
      right: 31px;
      width: 31px;
      height: 31px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 1000;
      color: white;
      z-index: 11;
      pointer-events: none;
      opacity: 0;
      transform: scale(0);
      transition: all .22s cubic-bezier(.175,.885,.32,1.275);
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border: 2px solid #f0abfc;
      box-shadow: 0 0 16px rgba(236, 72, 153, .9);
    }

    #status-badge.thinking, #status-badge.response-ready { opacity: 1; transform: scale(1); animation: badgePulse 1.1s ease-in-out infinite; }
    #status-badge.response-ready { background: linear-gradient(135deg, #10b981, #ec4899); }
    #status-badge.hidden { opacity: 0; transform: scale(0); }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes sparkBlink { 0%,100% { opacity:.22; transform: scale(.8); } 50% { opacity:1; transform: scale(1.2); } }
    @keyframes corePulse { 0%,100% { filter: drop-shadow(0 0 7px var(--core-stroke)); } 50% { filter: drop-shadow(0 0 20px var(--ring3-color)); } }
    @keyframes coreFlash { 0%,100% { filter: drop-shadow(0 0 10px #ec4899); } 50% { filter: drop-shadow(0 0 28px #ff1f8f); } }
    @keyframes blinkEyes { 0%,90%,100% { transform: scaleY(1); } 94% { transform: scaleY(.18); } }
    @keyframes groundedBreath { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(1px) scale(1.015,.985); } }
    @keyframes walkBody { 0% { transform: translateY(0) rotate(-1.5deg); } 100% { transform: translateY(-2px) rotate(1.5deg); } }
    @keyframes leftWalk { from { transform: rotate(-18deg) translateY(1px); } to { transform: rotate(20deg) translateY(-1px); } }
    @keyframes rightWalk { from { transform: rotate(20deg) translateY(-1px); } to { transform: rotate(-18deg) translateY(1px); } }
    @keyframes hopSquash { 0% { transform: scale(1.08,.86) translateY(2px); } 100% { transform: scale(.94,1.18) translateY(-5px); } }
    @keyframes hoverGoat { from { transform: translateY(-3px) rotate(-1deg); } to { transform: translateY(3px) rotate(1deg); } }
    @keyframes thrusterFlicker { from { transform: scaleY(.65); opacity:.6; } to { transform: scaleY(1.5); opacity:1; } }
    @keyframes tailWhip { from { transform: rotate(-5deg); } to { transform: rotate(8deg); } }
    @keyframes spinOnce { from { transform: rotate(0deg) scale(1); } to { transform: rotate(360deg) scale(1.04); } }
    @keyframes portalIn { from { transform: scale(1) rotate(0deg); opacity:1; } to { transform: scale(.02) rotate(360deg); opacity:0; } }
    @keyframes portalOut { from { transform: scale(.02) rotate(-360deg); opacity:0; } to { transform: scale(1) rotate(0deg); opacity:1; } }
    @keyframes alertShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
    @keyframes badgePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.17); } }
    @keyframes cyberGlitch { 0%,91%,100% { transform: translate(0); } 92% { transform: translate(-1px,1px); } 94% { transform: translate(1px,-1px); } 96% { transform: translate(-.5px,-.5px); } }
  </style>
</head>
<body>
  <div id="stage">
    <div id="wrap">
      <div id="close-pet" title="Cerrar Goatky">×</div>
      <div id="settings-pet" title="Ajustes">⚙</div>
      <div id="status-badge" class="hidden">?</div>
      <div id="bubble">Tócame para hablar</div>
      <canvas id="canvas-fx"></canvas>
      <div id="pet-float-container">
        <div id="pet" class="physics-idle_grounded">
          <svg viewBox="0 0 220 220" aria-label="Goatky neon goat robot mascot">
            <defs>
              <linearGradient id="plateGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#1d1630"/>
                <stop offset="48%" stop-color="#090713"/>
                <stop offset="100%" stop-color="#2b123f"/>
              </linearGradient>
              <linearGradient id="hornGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#0b0713"/>
                <stop offset="54%" stop-color="#181026"/>
                <stop offset="100%" stop-color="#4c1d95"/>
              </linearGradient>
              <linearGradient id="flameGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#fdf4ff"/>
                <stop offset="42%" stop-color="#ec4899"/>
                <stop offset="100%" stop-color="#7e22ce"/>
              </linearGradient>
            </defs>

            <ellipse id="pet-shadow" cx="110" cy="184" rx="42" ry="7"/>
            <circle class="hud-ring-outer" cx="110" cy="105" r="100"/>
            <circle class="hud-ring-mid" cx="110" cy="105" r="82"/>
            <circle class="hud-ring-inner" cx="110" cy="105" r="62"/>
            <rect class="spark" x="108" y="8" width="5" height="13" rx="2"/>
            <rect class="spark" x="187" y="88" width="5" height="13" rx="2" transform="rotate(80 189 94)"/>
            <rect class="spark" x="28" y="88" width="5" height="13" rx="2" transform="rotate(-80 30 94)"/>
            <rect class="spark" x="55" y="23" width="4" height="11" rx="2" transform="rotate(-34 57 28)"/>
            <rect class="spark" x="161" y="23" width="4" height="11" rx="2" transform="rotate(34 163 28)"/>

            <g id="goatky-character">
              <g id="goat-tail">
                <path class="tail-line" d="M 85 151 C 62 151, 58 170, 69 176 C 78 181, 87 171, 76 165"/>
                <polygon class="tail-tip" points="63,173 49,180 62,187 66,179"/>
              </g>

              <path class="horn-main" d="M 86 68 C 69 31, 46 22, 31 34 C 52 43, 66 57, 80 81 Z"/>
              <path class="horn-edge" d="M 79 68 C 64 39, 47 30, 34 35"/>
              <path class="horn-edge" d="M 69 56 L 55 50" opacity=".75"/>
              <path class="horn-edge" d="M 59 45 L 47 40" opacity=".55"/>

              <path class="horn-main" d="M 134 68 C 151 31, 174 22, 189 34 C 168 43, 154 57, 140 81 Z"/>
              <path class="horn-edge" d="M 141 68 C 156 39, 173 30, 186 35"/>
              <path class="horn-edge" d="M 151 56 L 165 50" opacity=".75"/>
              <path class="horn-edge" d="M 161 45 L 173 40" opacity=".55"/>

              <path class="dark-plate" d="M 70 91 L 43 83 L 57 105 L 76 103 Z"/>
              <path class="neon-line" d="M 50 87 L 66 97" opacity=".7"/>
              <path class="dark-plate" d="M 150 91 L 177 83 L 163 105 L 144 103 Z"/>
              <path class="neon-line" d="M 170 87 L 154 97" opacity=".7"/>

              <path class="plate" d="M 78 73 L 142 73 L 154 88 L 149 121 L 134 136 L 86 136 L 71 121 L 66 88 Z"/>
              <path class="visor-shell" d="M 77 87 L 143 87 L 148 96 L 144 118 L 132 126 L 88 126 L 76 118 L 72 96 Z"/>
              <path class="visor-glass" d="M 82 91 L 138 91 L 142 98 L 139 114 L 128 121 L 92 121 L 81 114 L 78 98 Z"/>
              <path class="visor-reflection" d="M 88 96 C 103 91, 119 91, 134 96"/>
              <path class="neon-line" d="M 102 82 L 110 89 L 118 82" opacity=".78"/>

              <g class="eyes-open">
                <polygon class="eye-shape" points="91,102 106,106 101,113 88,109"/>
                <polygon class="eye-shape" points="129,102 114,106 119,113 132,109"/>
              </g>
              <g class="eyes-closed" style="display:none;">
                <path d="M 90 107 L 104 108"/>
                <path d="M 116 108 L 130 107"/>
              </g>

              <path id="mouth-open" d="M 96 116 L 102 121 L 107 116 L 112 122 L 118 116 L 124 120"/>
              <path id="mouth-closed" d="M 100 118 L 120 118" style="display:none;"/>

              <path class="joint" d="M 101 135 L 119 135 L 116 143 L 104 143 Z"/>
              <path class="plate" d="M 82 142 L 138 142 L 130 171 L 110 178 L 90 171 Z"/>
              <circle class="core" cx="110" cy="155" r="13"/>
              <path class="goat-emblem" d="M 102 157 C 101 149, 107 149, 110 155 C 113 149, 119 149, 118 157"/>
              <path class="goat-emblem" d="M 106 160 L 110 165 L 114 160"/>
              <path class="goat-emblem" d="M 103 153 C 99 149, 98 145, 100 142" opacity=".7"/>
              <path class="goat-emblem" d="M 117 153 C 121 149, 122 145, 120 142" opacity=".7"/>

              <g id="left-arm">
                <path class="joint" d="M 83 145 L 69 154 L 73 163 L 88 154 Z"/>
                <path class="claw" d="M 66 161 L 57 168 L 68 169 Z"/>
              </g>
              <g id="right-arm">
                <path class="joint" d="M 137 145 L 151 154 L 147 163 L 132 154 Z"/>
                <path class="claw" d="M 154 161 L 163 168 L 152 169 Z"/>
              </g>

              <g id="left-leg">
                <path class="joint" d="M 94 169 L 86 183 L 96 186 L 104 173 Z"/>
                <path class="hoof" d="M 82 185 L 98 185 L 92 194 Z"/>
              </g>
              <g id="right-leg">
                <path class="joint" d="M 126 169 L 134 183 L 124 186 L 116 173 Z"/>
                <path class="hoof" d="M 122 185 L 138 185 L 128 194 Z"/>
              </g>

              <polygon id="thruster-flame" points="102,174 118,174 110,201"/>
            </g>
          </svg>
        </div>
      </div>
      <div id="mood">ACTIVA</div>
    </div>
  </div>

  <script>
    const pet = document.getElementById("pet");
    const bubble = document.getElementById("bubble");
    const mood = document.getElementById("mood");
    const canvas = document.getElementById("canvas-fx");
    const ctx = canvas.getContext("2d");

    let latestState = null;
    let lastSeenEventId = null;
    let lastOperationalEventId = null;
    let currentOperationalState = "idle";
    let lastSceneState = "idle";
    let isSleeping = false;
    let isCelebrating = false;
    let isGlowing = false;
    let isOffline = false;
    let customStateActive = false;
    let chatterMode = "normal";
    let currentVx = 0;
    let currentVy = 0;
    let currentFlip = 1;
    let currentTilt = 0;
    let portalState = "inactive";
    let portalTime = 0;
    let lastFrameTime = performance.now();

    function setPalette(state) {
      const palettes = {
        idle: ["rgba(236,72,153,.92)", "#7e22ce", "#a855f7", "#ec4899", "#ec4899", "rgba(88,28,135,.42)", "#fdf4ff"],
        thinking: ["rgba(255,31,143,.96)", "#be123c", "#e11d48", "#ff1f8f", "#ff1f8f", "rgba(127,29,29,.44)", "#ffe4f1"],
        executing: ["rgba(168,85,247,1)", "#6d28d9", "#9333ea", "#ec4899", "#d946ef", "rgba(88,28,135,.52)", "#fdf4ff"],
        success: ["rgba(52,211,153,.95)", "#059669", "#10b981", "#34d399", "#34d399", "rgba(6,95,70,.42)", "#dcfce7"],
        error: ["rgba(248,113,113,.98)", "#991b1b", "#dc2626", "#fb7185", "#ef4444", "rgba(127,29,29,.52)", "#fee2e2"],
        sleep: ["rgba(71,85,105,.34)", "#1e293b", "#334155", "#64748b", "#475569", "rgba(15,23,42,.62)", "#94a3b8"]
      };
      const p = palettes[state] || palettes.idle;
      const root = document.documentElement;
      root.style.setProperty("--glow-color", p[0]);
      root.style.setProperty("--ring1-color", p[1]);
      root.style.setProperty("--ring2-color", p[2]);
      root.style.setProperty("--ring3-color", p[3]);
      root.style.setProperty("--core-stroke", p[4]);
      root.style.setProperty("--core-fill", p[5]);
      root.style.setProperty("--face-color", p[6]);
    }

    function normalizeSceneState(raw) {
      const state = raw || "idle";
      if (["idle", "thinking", "executing", "success", "error"].includes(state)) return state;
      if (state === "preparing") return "thinking";
      if (state === "warning") return "error";
      return "idle";
    }

    function applyOperationalScene(scene) {
      if (customStateActive) return true;
      const opState = normalizeSceneState(scene?.state);
      currentOperationalState = opState;
      pet.classList.remove("scene-idle", "scene-thinking", "scene-executing", "scene-success", "scene-error");
      pet.classList.add(`scene-${opState}`);
      setPalette(opState);
      const changed = opState !== lastSceneState;
      lastSceneState = opState;

      if (opState === "idle") {
        mood.textContent = "ACTIVA";
        bubble.textContent = "Tócame para hablar";
        window.electronAPI?.updateMovementMode?.("vivo");
        return false;
      }

      const labels = { thinking: "Calculando…", executing: "Operando…", success: "Listo", error: "Alerta" };
      mood.textContent = opState.toUpperCase();
      bubble.textContent = scene?.summary || labels[opState] || "Operando…";
      window.electronAPI?.updateMovementMode?.(opState === "executing" ? "pause" : "vivo");

      if ((scene?.event_id && scene.event_id !== lastOperationalEventId) || changed) {
        lastOperationalEventId = scene?.event_id || lastOperationalEventId;
        if (opState === "success") triggerCelebrate(false);
        if (opState === "error") {
          pet.classList.add("scene-error");
          setTimeout(() => pet.classList.remove("scene-error"), 800);
        }
      }
      return true;
    }

    function applyVisualState(state) {
      if (customStateActive || isSleeping || isCelebrating || isGlowing || isOffline) return;
      const conf = state.config || {};
      const root = document.documentElement;

      if (conf.size === "pequeño") root.style.setProperty("--pet-scale", "0.82");
      else if (conf.size === "grande") root.style.setProperty("--pet-scale", "1.18");
      else root.style.setProperty("--pet-scale", "1");

      chatterMode = conf.quiet_mode || state.mood === "tranquilo" ? "bajo" : "normal";
      setPalette(chatterMode === "bajo" ? "sleep" : "idle");
      mood.textContent = chatterMode === "bajo" ? "SOMBRA" : "ACTIVA";
      window.electronAPI?.updateMovementMode?.(chatterMode === "bajo" ? "suave" : "vivo");
    }

    function triggerCelebrate(restore = true) {
      if (isSleeping) return;
      isCelebrating = true;
      pet.classList.add("celebrate");
      setPalette("success");
      bubble.textContent = "Habilidad cargada";
      mood.textContent = "LOADED";
      setTimeout(() => {
        pet.classList.remove("celebrate");
        isCelebrating = false;
        if (restore && latestState) applyVisualState(latestState);
      }, 1600);
    }

    function triggerGlow() {
      if (isSleeping) return;
      isGlowing = true;
      pet.classList.add("glow-bright");
      bubble.textContent = "Recuerdo guardado";
      mood.textContent = "MEM";
      setTimeout(() => {
        pet.classList.remove("glow-bright");
        isGlowing = false;
        if (latestState) applyVisualState(latestState);
      }, 2500);
    }

    function triggerSleep() {
      isSleeping = true;
      setPalette("sleep");
      mood.textContent = "Zzz";
      bubble.textContent = "Goatky hibernando.";
      window.electronAPI?.updateMovementMode?.("pause");
      document.querySelector(".eyes-open").style.display = "none";
      document.querySelector(".eyes-closed").style.display = "block";
      document.getElementById("mouth-open").style.display = "none";
      document.getElementById("mouth-closed").style.display = "block";

      setTimeout(() => {
        isSleeping = false;
        document.querySelector(".eyes-open").style.display = "block";
        document.querySelector(".eyes-closed").style.display = "none";
        document.getElementById("mouth-open").style.display = "block";
        document.getElementById("mouth-closed").style.display = "none";
        if (latestState) applyVisualState(latestState);
      }, 12000);
    }

    function updatePhysicsClass(state) {
      pet.classList.remove("physics-grounded_walk", "physics-hop", "physics-idle_grounded", "physics-fly", "physics-dash", "physics-warp", "physics-warping-transition");
      if (state) pet.classList.add(`physics-${state}`);
    }

    async function pollState() {
      try {
        if (!window.electronAPI?.getCompanionState) return;
        const data = await window.electronAPI.getCompanionState();

        if (!data.ok) {
          if (!isOffline) {
            isOffline = true;
            setPalette("error");
            mood.textContent = "OFFLINE";
            bubble.textContent = data.error || "Desconectado";
            window.electronAPI?.updateMovementMode?.("pause");
          }
          return;
        }

        if (isOffline) {
          isOffline = false;
          bubble.textContent = "Conexión restaurada";
        }

        latestState = data;

        if (data.last_event_id && data.last_event_id !== lastSeenEventId) {
          const old = lastSeenEventId;
          lastSeenEventId = data.last_event_id;
          if (old !== null) {
            if (data.last_event_type === "dream_cycle") triggerSleep();
            else if (data.last_event_type === "skill_learned") triggerCelebrate();
            else if (data.last_event_type === "memory_learned") triggerGlow();
          }
        }

        if (!applyOperationalScene(data.operational_scene)) applyVisualState(data);
      } catch (err) {
        console.error("Error polling state IPC:", err);
      }
    }

    document.getElementById("close-pet").addEventListener("click", (event) => {
      event.stopPropagation();
      window.electronAPI?.closeApp?.();
    });

    document.getElementById("settings-pet").addEventListener("click", (event) => {
      event.stopPropagation();
      window.electronAPI?.openSettings?.();
    });

    pet.addEventListener("click", () => {
      window.electronAPI?.userActivity?.();
      window.electronAPI?.openChat?.();
      bubble.textContent = "Abriendo chat…";
      mood.textContent = "CHAT";
      setTimeout(() => {
        if (!customStateActive && latestState) applyVisualState(latestState);
        else if (!customStateActive) {
          bubble.textContent = "Tócame para hablar";
          mood.textContent = "ACTIVA";
        }
      }, 2200);
    });

    if (window.electronAPI?.onSetState) {
      window.electronAPI.onSetState((data) => {
        const badge = document.getElementById("status-badge");
        if (!badge) return;

        if (data.state === "thinking") {
          customStateActive = true;
          badge.className = "thinking";
          badge.textContent = "?";
          setPalette("thinking");
          bubble.textContent = "Calculando respuesta…";
          mood.textContent = "THINK";
          window.electronAPI?.updateMovementMode?.("vivo");
        } else if (data.state === "response-ready") {
          customStateActive = true;
          badge.className = "response-ready";
          badge.textContent = "!";
          setPalette("success");
          bubble.textContent = "Respuesta lista.";
          mood.textContent = "READY";
          triggerCelebrate(false);
        } else {
          customStateActive = false;
          badge.className = "hidden";
          if (latestState) applyVisualState(latestState);
        }
      });
    }

    if (window.electronAPI?.onEvent) {
      window.electronAPI.onEvent("pet:config-changed", (newConfig) => {
        if (latestState) {
          latestState.config = newConfig;
          applyVisualState(latestState);
        }
      });

      window.electronAPI.onEvent("pet:celebrate", () => triggerCelebrate());
      window.electronAPI.onEvent("pet:glow", () => triggerGlow());
      window.electronAPI.onEvent("pet:sleep", () => triggerSleep());

      window.electronAPI.onEvent("pet:warp-start", () => {
        portalState = "entering";
        portalTime = 0;
        updatePhysicsClass("warp");
        pet.classList.remove("portal-entering", "portal-exiting", "celebrate", "bounce");
        void pet.offsetWidth;
        pet.classList.add("portal-entering");
      });

      window.electronAPI.onEvent("pet:warp-end", () => {
        portalState = "exiting";
        portalTime = 0;
        pet.classList.remove("portal-entering", "portal-exiting", "celebrate", "bounce");
        void pet.offsetWidth;
        pet.classList.add("portal-exiting");
        setTimeout(() => pet.classList.remove("portal-exiting"), 650);
      });

      window.electronAPI.onEvent("pet:step", (data) => {
        if (!pet) return;
        const vx = data.vx || 0;
        const vy = data.vy || 0;
        const state = data.behaviorState || "idle_grounded";

        currentVx = vx;
        currentVy = vy;
        updatePhysicsClass(state);

        if (pet.classList.contains("portal-entering") || pet.classList.contains("portal-exiting")) return;

        if (vx < -0.05) currentFlip = -1;
        else if (vx > 0.05) currentFlip = 1;

        const targetTilt = Math.max(-10, Math.min(10, vx * 3.2));
        currentTilt = currentTilt + (targetTilt - currentTilt) * 0.18;

        const speed = Math.sqrt(vx * vx + vy * vy);
        const stretchFactor = Math.min(0.08, speed * 0.015);
        const scaleX = 1 + stretchFactor;
        const scaleY = 1 - stretchFactor;

        if ((state === "dash" || state === "fly") && speed > 0.4) pet.classList.add("dashing");
        else pet.classList.remove("dashing");

        const floatSway = state === "fly" ? Math.sin(Date.now() / 180) * 2.2 : 0;
        pet.style.transform = `rotate(${currentTilt + floatSway}deg) scaleX(${currentFlip * scaleX}) scaleY(${scaleY})`;
      });
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = 240 * dpr;
      canvas.height = 240 * dpr;
      ctx.resetTransform();
      ctx.scale(dpr, dpr);
    }

    function renderLoop(now) {
      const dt = Math.min((now - lastFrameTime) / 1000, .1);
      lastFrameTime = now;
      ctx.clearRect(0, 0, 240, 240);

      if (portalState !== "inactive") {
        portalTime += dt * 1000;
        const duration = portalState === "entering" ? 500 : 620;
        const progress = Math.min(portalTime / duration, 1);
        const alpha = portalState === "entering" ? progress : 1 - progress;
        const radius = 26 + progress * 82;

        const grad = ctx.createRadialGradient(120, 120, 8, 120, 120, radius);
        grad.addColorStop(0, `rgba(3,3,8,${0.9 * alpha})`);
        grad.addColorStop(.35, `rgba(236,72,153,${0.58 * alpha})`);
        grad.addColorStop(.72, `rgba(126,34,206,${0.34 * alpha})`);
        grad.addColorStop(1, "rgba(0,0,0,0)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(120, 120, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(236,72,153,${0.75 * alpha})`;
        ctx.lineWidth = 3;
        ctx.setLineDash([16, 12]);
        ctx.beginPath();
        ctx.arc(120, 120, radius * .72, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        if (portalState === "exiting" && progress >= 1) portalState = "inactive";
      }

      requestAnimationFrame(renderLoop);
    }

    setInterval(() => {
      if (customStateActive || isSleeping || isCelebrating || isGlowing || currentOperationalState !== "idle") return;
      const threshold = chatterMode === "bajo" ? 0.92 : 0.74;
      if (Math.random() <= threshold) return;
      const phrases = [
        "Todo estable.",
        "Goatky activo.",
        "Modo neón listo.",
        "Memoria local estable.",
        "Esperando orden, jefe.",
        "Ronda de escritorio activa."
      ];
      bubble.textContent = phrases[Math.floor(Math.random() * phrases.length)];
    }, 8500);

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    requestAnimationFrame(renderLoop);
    pollState();
    setInterval(pollState, 3000);
  </script>
</body>
</html>
