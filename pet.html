<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Lokkygoat / Goatky</title>
  <style>
    :root {
      --glow-color: rgba(236, 72, 153, 0.92);
      --ring1-color: #7e22ce;
      --ring2-color: #a855f7;
      --ring3-color: #ec4899;
      --core-stroke: #ec4899;
      --core-fill: rgba(88, 28, 135, 0.42);
      --face-color: #fdf4ff;
      --plate-edge: #3b1f57;
      --pet-scale: 1;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      -webkit-app-region: no-drag;
    }

    #wrap {
      position: relative;
      width: 240px;
      height: 240px;
      display: grid;
      place-items: center;
      overflow: visible;
    }

    #bubble {
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 210px;
      padding: 8px 12px;
      border-radius: 15px;
      background: rgba(5, 5, 8, 0.94);
      border: 1px solid rgba(236, 72, 153, 0.58);
      color: #fce7f3;
      font-size: 11px;
      line-height: 1.25;
      text-align: center;
      box-shadow: 0 0 18px rgba(236, 72, 153, 0.22), 0 12px 28px rgba(0, 0, 0, 0.72);
      z-index: 7;
      pointer-events: none;
      text-shadow: 0 0 9px rgba(236, 72, 153, 0.68);
    }

    #bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: rgba(5, 5, 8, 0.94);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
    }

    #canvas-fx {
      position: absolute;
      top: 0;
      left: 0;
      width: 240px;
      height: 240px;
      pointer-events: none;
      z-index: 1;
    }

    #pet-float-container {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      pointer-events: none;
      transform-origin: 50% 50%;
    }

    #pet {
      width: calc(192px * var(--pet-scale, 1));
      height: calc(192px * var(--pet-scale, 1));
      margin-top: 30px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      z-index: 3;
      pointer-events: auto;
      transform-origin: 50% 58%;
      transition: filter 0.25s ease, transform 0.08s linear;
      filter: drop-shadow(0 0 14px rgba(236, 72, 153, 0.92)) drop-shadow(0 0 38px rgba(126, 34, 206, 0.78));
    }

    #pet:hover {
      filter: drop-shadow(0 0 20px rgba(255, 31, 143, 1)) drop-shadow(0 0 54px rgba(168, 85, 247, 0.95));
    }

    svg { width: 100%; height: 100%; overflow: visible; }

    .hud-ring-outer, .hud-ring-mid, .hud-ring-inner {
      fill: none;
      transform-origin: 110px 110px;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .hud-ring-outer { stroke: var(--ring3-color); stroke-width: 1.2; stroke-dasharray: 1 24 7 16; opacity: .44; animation: spin 28s linear infinite; }
    .hud-ring-mid { stroke: var(--ring2-color); stroke-width: 2.2; stroke-dasharray: 42 28; opacity: .5; animation: spinReverse 21s linear infinite; }
    .hud-ring-inner { stroke: var(--ring1-color); stroke-width: 1.4; stroke-dasharray: 18 18; opacity: .42; animation: spin 14s linear infinite; }

    .reticle-line {
      stroke: rgba(236, 72, 153, .22);
      stroke-width: 1;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px rgba(236, 72, 153, .45));
    }

    .spark {
      fill: var(--ring3-color);
      opacity: .7;
      filter: drop-shadow(0 0 9px var(--ring3-color));
      animation: sparkBlink 2.6s ease-in-out infinite;
    }

    .void-orb {
      fill: url(#voidOrbGradient);
      stroke: rgba(236, 72, 153, .26);
      stroke-width: 1.4;
      filter: url(#nebulaGlow);
      opacity: .82;
    }

    .void-orb.deep {
      stroke: rgba(168, 85, 247, .26);
      opacity: .68;
    }

    .smoke-lobe {
      fill: url(#nebulaGradient);
      filter: url(#smokeBlur);
      opacity: .76;
      mix-blend-mode: screen;
    }

    .smoke-lobe.shadow {
      fill: url(#blackMistGradient);
      filter: url(#voidBlur);
      opacity: .92;
      mix-blend-mode: normal;
    }

    .rift {
      fill: none;
      stroke: url(#riftGradient);
      stroke-width: 10;
      stroke-linecap: round;
      filter: url(#smokeBlur);
      opacity: .7;
    }

    .neon-line {
      fill: none;
      stroke: var(--ring3-color);
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 7px var(--ring3-color));
    }

    .face-void {
      fill: url(#faceVoidGradient);
      filter: url(#voidBlur);
      opacity: .98;
    }

    .core {
      fill: var(--core-fill);
      stroke: var(--core-stroke);
      stroke-width: 2;
      filter: drop-shadow(0 0 10px var(--core-stroke));
      animation: corePulse 2.6s ease-in-out infinite;
    }

    .eyes-open {
      filter: drop-shadow(0 0 9px var(--ring3-color)) drop-shadow(0 0 16px rgba(236, 72, 153, .78));
      transform-origin: 110px 101px;
      animation: blinkEyes 4.6s ease-in-out infinite;
    }

    .eye-shape { fill: var(--ring3-color); }

    .eyes-closed path {
      stroke: var(--ring3-color);
      stroke-width: 3;
      stroke-linecap: round;
      fill: none;
      filter: drop-shadow(0 0 9px var(--ring3-color));
    }

    #mouth-open, #mouth-closed {
      fill: none;
      stroke: var(--ring3-color);
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 9px var(--ring3-color)) drop-shadow(0 0 18px rgba(236, 72, 153, .62));
    }

    #mouth-open { stroke-width: 2.8; }
    #mouth-closed { stroke-width: 2.4; }

    .mist-tendril {
      fill: none;
      stroke: url(#mistStrokeGradient);
      stroke-width: 10;
      stroke-linecap: round;
      filter: url(#smokeBlur);
      opacity: .62;
    }

    .mist-tendril.edge {
      stroke: var(--ring3-color);
      stroke-width: 1.4;
      filter: drop-shadow(0 0 6px var(--ring3-color));
      opacity: .54;
    }

    #pet-shadow {
      fill: rgba(236, 72, 153, 0.18);
      filter: blur(3px) drop-shadow(0 0 16px rgba(236, 72, 153, 0.42));
      transform-origin: 110px 184px;
      transition: opacity .16s ease, transform .16s ease;
    }

    #goatky-character { transform-origin: 110px 111px; }
    #left-leg, #right-leg, #left-arm, #right-arm { transform-box: fill-box; }
    #left-leg { transform-origin: 60% 12%; }
    #right-leg { transform-origin: 40% 12%; }
    #left-arm { transform-origin: 83% 45%; }
    #right-arm { transform-origin: 17% 45%; }
    #goat-tail { transform-origin: 95px 145px; }

    #thruster-flame {
      opacity: 0;
      transform-origin: 110px 166px;
      fill: url(#flameGradient);
      filter: drop-shadow(0 0 14px var(--ring3-color)) url(#smokeBlur);
      transition: opacity .16s ease;
    }

    #pet.physics-idle_grounded #goatky-character { animation: groundedBreath 3.5s ease-in-out infinite; }
    #pet.physics-grounded_walk #goatky-character { animation: walkBody 0.5s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #left-leg { animation: leftWalk 0.44s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #right-leg { animation: rightWalk 0.44s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #left-arm { animation: rightWalk 0.58s ease-in-out infinite alternate; }
    #pet.physics-grounded_walk #right-arm { animation: leftWalk 0.58s ease-in-out infinite alternate; }
    #pet.physics-hop #goatky-character { animation: hopSquash .46s ease-in-out infinite alternate; }
    #pet.physics-hop #pet-shadow { opacity: .12; transform: scaleX(.74); }
    #pet.physics-fly #goatky-character, #pet.physics-dash #goatky-character { animation: hoverGoat 1.05s ease-in-out infinite alternate; }
    #pet.physics-fly #thruster-flame, #pet.physics-dash #thruster-flame { opacity: .78; animation: thrusterFlicker .12s ease-in-out infinite alternate; }
    #pet.physics-fly #pet-shadow, #pet.physics-dash #pet-shadow { opacity: .06; transform: scaleX(.5); }
    #pet.physics-fly #goat-tail, #pet.physics-dash #goat-tail { animation: tailWhip .9s ease-in-out infinite alternate; }
    #pet.dashing { filter: brightness(1.22) drop-shadow(0 0 24px var(--ring3-color)) drop-shadow(0 0 46px rgba(168, 85, 247, .76)) !important; }
    #pet.bounce, #pet.celebrate { animation: spinOnce .9s ease-in-out 1; }
    #pet.glow-bright .core { animation: coreFlash 1.05s ease-in-out infinite; }
    #pet.portal-entering { animation: portalIn .48s cubic-bezier(.55,.055,.675,.19) 1 forwards; }
    #pet.portal-exiting { animation: portalOut .58s cubic-bezier(.215,.61,.355,1) 1 forwards; }
    #pet.scene-thinking #goatky-character, #pet.scene-executing #goatky-character { animation: cyberGlitch 2.4s steps(1) infinite; }
    #pet.scene-thinking .eye-shape, #pet.scene-error .eye-shape { fill: #ff1f8f; }
    #pet.scene-success .eye-shape { fill: #34d399; }
    #pet.scene-executing .hud-ring-mid, #pet.scene-executing .hud-ring-outer, #pet.scene-executing .hud-ring-inner { opacity: .9; stroke-width: 3; animation-duration: 1.1s; }
    #pet.scene-error { animation: alertShake .55s ease-in-out 1; }

    #mood {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
      color: rgba(255, 46, 150, .82);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 3.2px;
      text-shadow: 0 0 7px rgba(236, 72, 153, .96), 0 0 18px rgba(126, 34, 206, .76);
      pointer-events: none;
      z-index: 6;
      opacity: .78;
    }

    #mood::before, #mood::after {
      content: "";
      display: inline-block;
      width: 20px;
      height: 1px;
      background: #ec4899;
      margin: 0 7px 3px;
      box-shadow: 0 0 8px #ec4899;
      opacity: .48;
    }

    #close-pet, #settings-pet {
      position: absolute;
      top: 12px;
      width: 23px;
      height: 23px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fce7f3;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 10;
      -webkit-app-region: no-drag;
      font-size: 13px;
      font-weight: 900;
      backdrop-filter: blur(6px);
    }

    #close-pet { right: 10px; background: rgba(127, 29, 29, .78); border: 1px solid rgba(248, 113, 113, .9); box-shadow: 0 0 12px rgba(239, 68, 68, .48); }
    #settings-pet { right: 40px; background: rgba(49, 18, 82, .76); border: 1px solid rgba(236, 72, 153, .76); box-shadow: 0 0 12px rgba(236, 72, 153, .42); }
    #wrap:hover #close-pet, #wrap:hover #settings-pet { opacity: 1; }
    #close-pet:hover, #settings-pet:hover { transform: scale(1.1); }

    #status-badge {
      position: absolute;
      top: 35px;
      right: 31px;
      width: 31px;
      height: 31px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 1000;
      color: white;
      z-index: 11;
      pointer-events: none;
      opacity: 0;
      transform: scale(0);
      transition: all .22s cubic-bezier(.175,.885,.32,1.275);
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border: 2px solid #f0abfc;
      box-shadow: 0 0 16px rgba(236, 72, 153, .9);
    }

    #status-badge.thinking, #status-badge.response-ready { opacity: 1; transform: scale(1); animation: badgePulse 1.1s ease-in-out infinite; }
    #status-badge.response-ready { background: linear-gradient(135deg, #10b981, #ec4899); }
    #status-badge.hidden { opacity: 0; transform: scale(0); }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes sparkBlink { 0%,100% { opacity:.18; transform: scale(.78); } 50% { opacity:1; transform: scale(1.24); } }
    @keyframes corePulse { 0%,100% { filter: drop-shadow(0 0 7px var(--core-stroke)); opacity: .64; } 50% { filter: drop-shadow(0 0 24px var(--ring3-color)); opacity: 1; } }
    @keyframes coreFlash { 0%,100% { filter: drop-shadow(0 0 12px #ec4899); } 50% { filter: drop-shadow(0 0 34px #ff1f8f); } }
    @keyframes blinkEyes { 0%,90%,100% { transform: scaleY(1); } 94% { transform: scaleY(.16); } }
    @keyframes groundedBreath { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(1px) scale(1.025,.985); } }
    @keyframes walkBody { 0% { transform: translateY(0) rotate(-1.4deg); } 100% { transform: translateY(-2px) rotate(1.4deg); } }
    @keyframes leftWalk { from { transform: rotate(-10deg) translateY(1px); } to { transform: rotate(12deg) translateY(-1px); } }
    @keyframes rightWalk { from { transform: rotate(12deg) translateY(-1px); } to { transform: rotate(-10deg) translateY(1px); } }
    @keyframes hopSquash { 0% { transform: scale(1.1,.84) translateY(2px); } 100% { transform: scale(.94,1.18) translateY(-5px); } }
    @keyframes hoverGoat { from { transform: translateY(-3px) rotate(-1deg); } to { transform: translateY(3px) rotate(1deg); } }
    @keyframes thrusterFlicker { from { transform: scaleY(.66); opacity:.46; } to { transform: scaleY(1.45); opacity:.88; } }
    @keyframes tailWhip { from { transform: rotate(-4deg); } to { transform: rotate(9deg); } }
    @keyframes spinOnce { from { transform: rotate(0deg) scale(1); } to { transform: rotate(360deg) scale(1.04); } }
    @keyframes portalIn { from { transform: scale(1) rotate(0deg); opacity:1; } to { transform: scale(.02) rotate(360deg); opacity:0; } }
    @keyframes portalOut { from { transform: scale(.02) rotate(-360deg); opacity:0; } to { transform: scale(1) rotate(0deg); opacity:1; } }
    @keyframes alertShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
    @keyframes badgePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.17); } }
    @keyframes cyberGlitch { 0%,91%,100% { transform: translate(0); } 92% { transform: translate(-1px,1px); } 94% { transform: translate(1px,-1px); } 96% { transform: translate(-.5px,-.5px); } }
  </style>
</head>
<body>
  <div id="stage">
    <div id="wrap">
      <div id="close-pet" title="Cerrar Goatky">×</div>
      <div id="settings-pet" title="Ajustes">⚙</div>
      <div id="status-badge" class="hidden">?</div>
      <div id="bubble">Tócame para hablar</div>
      <canvas id="canvas-fx"></canvas>
      <div id="pet-float-container">
        <div id="pet" class="physics-idle_grounded">
          <svg viewBox="0 0 220 220" aria-label="Goatky dark nebula red team avatar">
            <defs>
              <radialGradient id="voidOrbGradient" cx="50%" cy="48%" r="58%">
                <stop offset="0%" stop-color="#000006"/>
                <stop offset="54%" stop-color="#02010a"/>
                <stop offset="78%" stop-color="#16051f"/>
                <stop offset="100%" stop-color="#ec4899" stop-opacity=".42"/>
              </radialGradient>
              <radialGradient id="nebulaGradient" cx="50%" cy="48%" r="70%">
                <stop offset="0%" stop-color="#ff1f8f" stop-opacity=".86"/>
                <stop offset="42%" stop-color="#7e22ce" stop-opacity=".62"/>
                <stop offset="78%" stop-color="#15051f" stop-opacity=".32"/>
                <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="blackMistGradient" cx="50%" cy="50%" r="70%">
                <stop offset="0%" stop-color="#000000"/>
                <stop offset="62%" stop-color="#03010a"/>
                <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="faceVoidGradient" cx="50%" cy="45%" r="58%">
                <stop offset="0%" stop-color="#000000"/>
                <stop offset="72%" stop-color="#020007"/>
                <stop offset="100%" stop-color="#170220" stop-opacity=".25"/>
              </radialGradient>
              <linearGradient id="riftGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#7e22ce" stop-opacity="0"/>
                <stop offset="42%" stop-color="#ec4899" stop-opacity=".84"/>
                <stop offset="70%" stop-color="#a855f7" stop-opacity=".52"/>
                <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="mistStrokeGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#ec4899" stop-opacity=".08"/>
                <stop offset="42%" stop-color="#7e22ce" stop-opacity=".78"/>
                <stop offset="100%" stop-color="#ff1f8f" stop-opacity=".14"/>
              </linearGradient>
              <linearGradient id="flameGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#fdf4ff" stop-opacity=".78"/>
                <stop offset="42%" stop-color="#ec4899" stop-opacity=".74"/>
                <stop offset="100%" stop-color="#7e22ce" stop-opacity="0"/>
              </linearGradient>
              <filter id="smokeBlur" x="-45%" y="-45%" width="190%" height="190%">
                <feGaussianBlur stdDeviation="5.4"/>
              </filter>
              <filter id="voidBlur" x="-45%" y="-45%" width="190%" height="190%">
                <feGaussianBlur stdDeviation="3.2"/>
              </filter>
              <filter id="nebulaGlow" x="-55%" y="-55%" width="210%" height="210%">
                <feGaussianBlur stdDeviation="3.6" result="blur"/>
                <feColorMatrix in="blur" type="matrix" values="1.3 0 0 0 0.08 0 0.4 0 0 0 0 0 1.5 0 0.2 0 0 0 1 0" result="glow"/>
                <feMerge>
                  <feMergeNode in="glow"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <ellipse id="pet-shadow" cx="110" cy="184" rx="52" ry="8"/>
            <circle class="hud-ring-outer" cx="110" cy="106" r="104"/>
            <circle class="hud-ring-mid" cx="110" cy="106" r="84"/>
            <circle class="hud-ring-inner" cx="110" cy="106" r="60"/>
            <line class="reticle-line" x1="110" y1="4" x2="110" y2="51"/>
            <line class="reticle-line" x1="110" y1="165" x2="110" y2="213"/>
            <line class="reticle-line" x1="8" y1="106" x2="55" y2="106"/>
            <line class="reticle-line" x1="165" y1="106" x2="212" y2="106"/>
            <circle class="void-orb deep" cx="27" cy="37" r="16"/>
            <circle class="void-orb" cx="190" cy="36" r="11"/>
            <circle class="void-orb deep" cx="191" cy="180" r="18"/>
            <circle class="spark" cx="110" cy="17" r="2.6"/>
            <circle class="spark" cx="44" cy="106" r="2.2"/>
            <circle class="spark" cx="178" cy="107" r="2.2"/>
            <circle class="spark" cx="110" cy="190" r="2.4"/>

            <g id="goatky-character">
              <path class="rift" d="M 38 91 C 60 59, 90 55, 108 78 C 126 52, 158 60, 182 88"/>
              <path class="rift" d="M 42 132 C 76 114, 103 135, 116 158 C 135 129, 164 127, 188 147" opacity=".66"/>
              <ellipse class="smoke-lobe" cx="82" cy="96" rx="48" ry="36" transform="rotate(-20 82 96)"/>
              <ellipse class="smoke-lobe" cx="139" cy="93" rx="50" ry="35" transform="rotate(17 139 93)"/>
              <ellipse class="smoke-lobe" cx="104" cy="133" rx="58" ry="43" transform="rotate(8 104 133)" opacity=".58"/>
              <ellipse class="smoke-lobe" cx="146" cy="143" rx="42" ry="33" transform="rotate(-25 146 143)" opacity=".56"/>
              <ellipse class="smoke-lobe shadow" cx="110" cy="108" rx="55" ry="61"/>
              <ellipse class="smoke-lobe shadow" cx="113" cy="119" rx="39" ry="52" opacity=".96"/>

              <g id="left-arm">
                <path class="mist-tendril" d="M 72 104 C 48 108, 31 125, 22 149"/>
                <path class="mist-tendril edge" d="M 61 106 C 42 113, 33 125, 27 139"/>
              </g>
              <g id="right-arm">
                <path class="mist-tendril" d="M 148 104 C 173 108, 192 126, 199 150"/>
                <path class="mist-tendril edge" d="M 158 106 C 178 115, 187 128, 193 143"/>
              </g>

              <g id="goat-tail">
                <path class="mist-tendril" d="M 92 146 C 69 164, 61 184, 78 191 C 92 197, 105 179, 92 170"/>
                <path class="mist-tendril edge" d="M 84 153 C 68 169, 68 183, 80 187"/>
              </g>

              <g id="left-leg">
                <path class="mist-tendril" d="M 99 149 C 88 166, 82 177, 72 191"/>
                <path class="mist-tendril edge" d="M 95 157 C 86 172, 80 181, 74 191"/>
              </g>
              <g id="right-leg">
                <path class="mist-tendril" d="M 124 149 C 135 166, 143 177, 153 191"/>
                <path class="mist-tendril edge" d="M 126 157 C 136 172, 145 181, 151 191"/>
              </g>

              <path class="face-void" d="M 72 65 C 86 47, 133 47, 148 65 C 162 82, 158 122, 138 139 C 126 151, 94 151, 82 139 C 62 121, 58 82, 72 65 Z"/>
              <ellipse class="core" cx="110" cy="132" rx="7" ry="5"/>
              <path class="neon-line" d="M 76 69 C 88 56, 132 56, 144 69" opacity=".42"/>
              <path class="neon-line" d="M 66 114 C 80 145, 140 146, 154 113" opacity=".18"/>

              <g class="eyes-open">
                <path class="eye-shape" d="M 83 96 C 93 88, 101 88, 106 96 C 98 99, 91 100, 83 96 Z"/>
                <path class="eye-shape" d="M 137 96 C 127 88, 119 88, 114 96 C 122 99, 129 100, 137 96 Z"/>
              </g>
              <g class="eyes-closed" style="display:none;">
                <path d="M 85 97 C 92 95, 99 95, 105 98"/>
                <path d="M 115 98 C 121 95, 128 95, 135 97"/>
              </g>

              <path id="mouth-open" d="M 91 117 C 101 129, 119 129, 130 117"/>
              <path id="mouth-closed" d="M 98 119 C 106 123, 116 123, 124 119" style="display:none;"/>
              <polygon id="thruster-flame" points="96,150 124,150 110,205"/>
            </g>
          </svg>
        </div>
      </div>
      <div id="mood">ACTIVA</div>
    </div>
  </div>

  <script>
    const pet = document.getElementById("pet");
    const bubble = document.getElementById("bubble");
    const mood = document.getElementById("mood");
    const canvas = document.getElementById("canvas-fx");
    const ctx = canvas.getContext("2d");

    let latestState = null;
    let lastSeenEventId = null;
    let lastOperationalEventId = null;
    let currentOperationalState = "idle";
    let lastSceneState = "idle";
    let isSleeping = false;
    let isCelebrating = false;
    let isGlowing = false;
    let isOffline = false;
    let customStateActive = false;
    let chatterMode = "normal";
    let currentVx = 0;
    let currentVy = 0;
    let currentFlip = 1;
    let currentTilt = 0;
    let portalState = "inactive";
    let portalTime = 0;
    let lastFrameTime = performance.now();

    function setPalette(state) {
      const palettes = {
        idle: ["rgba(236,72,153,.92)", "#7e22ce", "#a855f7", "#ec4899", "#ec4899", "rgba(88,28,135,.42)", "#fdf4ff"],
        thinking: ["rgba(255,31,143,.96)", "#be123c", "#e11d48", "#ff1f8f", "#ff1f8f", "rgba(127,29,29,.44)", "#ffe4f1"],
        executing: ["rgba(168,85,247,1)", "#6d28d9", "#9333ea", "#ec4899", "#d946ef", "rgba(88,28,135,.52)", "#fdf4ff"],
        success: ["rgba(52,211,153,.95)", "#059669", "#10b981", "#34d399", "#34d399", "rgba(6,95,70,.42)", "#dcfce7"],
        error: ["rgba(248,113,113,.98)", "#991b1b", "#dc2626", "#fb7185", "#ef4444", "rgba(127,29,29,.52)", "#fee2e2"],
        sleep: ["rgba(71,85,105,.34)", "#1e293b", "#334155", "#64748b", "#475569", "rgba(15,23,42,.62)", "#94a3b8"]
      };
      const p = palettes[state] || palettes.idle;
      const root = document.documentElement;
      root.style.setProperty("--glow-color", p[0]);
      root.style.setProperty("--ring1-color", p[1]);
      root.style.setProperty("--ring2-color", p[2]);
      root.style.setProperty("--ring3-color", p[3]);
      root.style.setProperty("--core-stroke", p[4]);
      root.style.setProperty("--core-fill", p[5]);
      root.style.setProperty("--face-color", p[6]);
    }

    function normalizeSceneState(raw) {
      const state = raw || "idle";
      if (["idle", "thinking", "executing", "success", "error"].includes(state)) return state;
      if (state === "preparing") return "thinking";
      if (state === "warning") return "error";
      return "idle";
    }

    function applyOperationalScene(scene) {
      if (customStateActive) return true;
      const opState = normalizeSceneState(scene?.state);
      currentOperationalState = opState;
      pet.classList.remove("scene-idle", "scene-thinking", "scene-executing", "scene-success", "scene-error");
      pet.classList.add(`scene-${opState}`);
      setPalette(opState);
      const changed = opState !== lastSceneState;
      lastSceneState = opState;

      if (opState === "idle") {
        mood.textContent = "ACTIVA";
        bubble.textContent = "Tócame para hablar";
        window.electronAPI?.updateMovementMode?.("vivo");
        return false;
      }

      const labels = { thinking: "Calculando…", executing: "Operando…", success: "Listo", error: "Alerta" };
      mood.textContent = opState.toUpperCase();
      bubble.textContent = scene?.summary || labels[opState] || "Operando…";
      window.electronAPI?.updateMovementMode?.(opState === "executing" ? "pause" : "vivo");

      if ((scene?.event_id && scene.event_id !== lastOperationalEventId) || changed) {
        lastOperationalEventId = scene?.event_id || lastOperationalEventId;
        if (opState === "success") triggerCelebrate(false);
        if (opState === "error") {
          pet.classList.add("scene-error");
          setTimeout(() => pet.classList.remove("scene-error"), 800);
        }
      }
      return true;
    }

    function applyVisualState(state) {
      if (customStateActive || isSleeping || isCelebrating || isGlowing || isOffline) return;
      const conf = state.config || {};
      const root = document.documentElement;

      if (conf.size === "pequeño") root.style.setProperty("--pet-scale", "0.82");
      else if (conf.size === "grande") root.style.setProperty("--pet-scale", "1.18");
      else root.style.setProperty("--pet-scale", "1");

      chatterMode = conf.quiet_mode || state.mood === "tranquilo" ? "bajo" : "normal";
      setPalette(chatterMode === "bajo" ? "sleep" : "idle");
      mood.textContent = chatterMode === "bajo" ? "SOMBRA" : "ACTIVA";
      window.electronAPI?.updateMovementMode?.(chatterMode === "bajo" ? "suave" : "vivo");
    }

    function triggerCelebrate(restore = true) {
      if (isSleeping) return;
      isCelebrating = true;
      pet.classList.add("celebrate");
      setPalette("success");
      bubble.textContent = "Habilidad cargada";
      mood.textContent = "LOADED";
      setTimeout(() => {
        pet.classList.remove("celebrate");
        isCelebrating = false;
        if (restore && latestState) applyVisualState(latestState);
      }, 1600);
    }

    function triggerGlow() {
      if (isSleeping) return;
      isGlowing = true;
      pet.classList.add("glow-bright");
      bubble.textContent = "Recuerdo guardado";
      mood.textContent = "MEM";
      setTimeout(() => {
        pet.classList.remove("glow-bright");
        isGlowing = false;
        if (latestState) applyVisualState(latestState);
      }, 2500);
    }

    function triggerSleep() {
      isSleeping = true;
      setPalette("sleep");
      mood.textContent = "Zzz";
      bubble.textContent = "Goatky hibernando.";
      window.electronAPI?.updateMovementMode?.("pause");
      document.querySelector(".eyes-open").style.display = "none";
      document.querySelector(".eyes-closed").style.display = "block";
      document.getElementById("mouth-open").style.display = "none";
      document.getElementById("mouth-closed").style.display = "block";

      setTimeout(() => {
        isSleeping = false;
        document.querySelector(".eyes-open").style.display = "block";
        document.querySelector(".eyes-closed").style.display = "none";
        document.getElementById("mouth-open").style.display = "block";
        document.getElementById("mouth-closed").style.display = "none";
        if (latestState) applyVisualState(latestState);
      }, 12000);
    }

    function updatePhysicsClass(state) {
      pet.classList.remove("physics-grounded_walk", "physics-hop", "physics-idle_grounded", "physics-fly", "physics-dash", "physics-warp", "physics-warping-transition");
      if (state) pet.classList.add(`physics-${state}`);
    }

    async function pollState() {
      try {
        if (!window.electronAPI?.getCompanionState) return;
        const data = await window.electronAPI.getCompanionState();

        if (!data.ok) {
          if (!isOffline) {
            isOffline = true;
            setPalette("error");
            mood.textContent = "OFFLINE";
            bubble.textContent = data.error || "Desconectado";
            window.electronAPI?.updateMovementMode?.("pause");
          }
          return;
        }

        if (isOffline) {
          isOffline = false;
          bubble.textContent = "Conexión restaurada";
        }

        latestState = data;

        if (data.last_event_id && data.last_event_id !== lastSeenEventId) {
          const old = lastSeenEventId;
          lastSeenEventId = data.last_event_id;
          if (old !== null) {
            if (data.last_event_type === "dream_cycle") triggerSleep();
            else if (data.last_event_type === "skill_learned") triggerCelebrate();
            else if (data.last_event_type === "memory_learned") triggerGlow();
          }
        }

        if (!applyOperationalScene(data.operational_scene)) applyVisualState(data);
      } catch (err) {
        console.error("Error polling state IPC:", err);
      }
    }

    document.getElementById("close-pet").addEventListener("click", (event) => {
      event.stopPropagation();
      window.electronAPI?.closeApp?.();
    });

    document.getElementById("settings-pet").addEventListener("click", (event) => {
      event.stopPropagation();
      window.electronAPI?.openSettings?.();
    });

    pet.addEventListener("click", () => {
      window.electronAPI?.userActivity?.();
      window.electronAPI?.openChat?.();
      bubble.textContent = "Abriendo chat…";
      mood.textContent = "CHAT";
      setTimeout(() => {
        if (!customStateActive && latestState) applyVisualState(latestState);
        else if (!customStateActive) {
          bubble.textContent = "Tócame para hablar";
          mood.textContent = "ACTIVA";
        }
      }, 2200);
    });

    if (window.electronAPI?.onSetState) {
      window.electronAPI.onSetState((data) => {
        const badge = document.getElementById("status-badge");
        if (!badge) return;

        if (data.state === "thinking") {
          customStateActive = true;
          badge.className = "thinking";
          badge.textContent = "?";
          setPalette("thinking");
          bubble.textContent = "Calculando respuesta…";
          mood.textContent = "THINK";
          window.electronAPI?.updateMovementMode?.("vivo");
        } else if (data.state === "response-ready") {
          customStateActive = true;
          badge.className = "response-ready";
          badge.textContent = "!";
          setPalette("success");
          bubble.textContent = "Respuesta lista.";
          mood.textContent = "READY";
          triggerCelebrate(false);
        } else {
          customStateActive = false;
          badge.className = "hidden";
          if (latestState) applyVisualState(latestState);
        }
      });
    }

    if (window.electronAPI?.onEvent) {
      window.electronAPI.onEvent("pet:config-changed", (newConfig) => {
        if (latestState) {
          latestState.config = newConfig;
          applyVisualState(latestState);
        }
      });

      window.electronAPI.onEvent("pet:celebrate", () => triggerCelebrate());
      window.electronAPI.onEvent("pet:glow", () => triggerGlow());
      window.electronAPI.onEvent("pet:sleep", () => triggerSleep());

      window.electronAPI.onEvent("pet:warp-start", () => {
        portalState = "entering";
        portalTime = 0;
        updatePhysicsClass("warp");
        pet.classList.remove("portal-entering", "portal-exiting", "celebrate", "bounce");
        void pet.offsetWidth;
        pet.classList.add("portal-entering");
      });

      window.electronAPI.onEvent("pet:warp-end", () => {
        portalState = "exiting";
        portalTime = 0;
        pet.classList.remove("portal-entering", "portal-exiting", "celebrate", "bounce");
        void pet.offsetWidth;
        pet.classList.add("portal-exiting");
        setTimeout(() => pet.classList.remove("portal-exiting"), 650);
      });

      window.electronAPI.onEvent("pet:step", (data) => {
        if (!pet) return;
        const vx = data.vx || 0;
        const vy = data.vy || 0;
        const state = data.behaviorState || "idle_grounded";

        currentVx = vx;
        currentVy = vy;
        updatePhysicsClass(state);

        if (pet.classList.contains("portal-entering") || pet.classList.contains("portal-exiting")) return;

        if (vx < -0.05) currentFlip = -1;
        else if (vx > 0.05) currentFlip = 1;

        const targetTilt = Math.max(-10, Math.min(10, vx * 3.2));
        currentTilt = currentTilt + (targetTilt - currentTilt) * 0.18;

        const speed = Math.sqrt(vx * vx + vy * vy);
        const stretchFactor = Math.min(0.08, speed * 0.015);
        const scaleX = 1 + stretchFactor;
        const scaleY = 1 - stretchFactor;

        if ((state === "dash" || state === "fly") && speed > 0.4) pet.classList.add("dashing");
        else pet.classList.remove("dashing");

        const floatSway = state === "fly" ? Math.sin(Date.now() / 180) * 2.2 : 0;
        pet.style.transform = `rotate(${currentTilt + floatSway}deg) scaleX(${currentFlip * scaleX}) scaleY(${scaleY})`;
      });
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = 240 * dpr;
      canvas.height = 240 * dpr;
      ctx.resetTransform();
      ctx.scale(dpr, dpr);
    }

    function renderLoop(now) {
      const dt = Math.min((now - lastFrameTime) / 1000, .1);
      lastFrameTime = now;
      ctx.clearRect(0, 0, 240, 240);

      if (portalState !== "inactive") {
        portalTime += dt * 1000;
        const duration = portalState === "entering" ? 500 : 620;
        const progress = Math.min(portalTime / duration, 1);
        const alpha = portalState === "entering" ? progress : 1 - progress;
        const radius = 26 + progress * 82;

        const grad = ctx.createRadialGradient(120, 120, 8, 120, 120, radius);
        grad.addColorStop(0, `rgba(3,3,8,${0.9 * alpha})`);
        grad.addColorStop(.35, `rgba(236,72,153,${0.58 * alpha})`);
        grad.addColorStop(.72, `rgba(126,34,206,${0.34 * alpha})`);
        grad.addColorStop(1, "rgba(0,0,0,0)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(120, 120, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(236,72,153,${0.75 * alpha})`;
        ctx.lineWidth = 3;
        ctx.setLineDash([16, 12]);
        ctx.beginPath();
        ctx.arc(120, 120, radius * .72, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        if (portalState === "exiting" && progress >= 1) portalState = "inactive";
      }

      requestAnimationFrame(renderLoop);
    }

    setInterval(() => {
      if (customStateActive || isSleeping || isCelebrating || isGlowing || currentOperationalState !== "idle") return;
      const threshold = chatterMode === "bajo" ? 0.92 : 0.74;
      if (Math.random() <= threshold) return;
      const phrases = [
        "Todo estable.",
        "Sombra activa.",
        "Nebulosa preparada.",
        "Memoria local estable.",
        "Esperando orden, jefe.",
        "Ronda de escritorio activa."
      ];
      bubble.textContent = phrases[Math.floor(Math.random() * phrases.length)];
    }, 8500);

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    requestAnimationFrame(renderLoop);
    pollState();
    setInterval(pollState, 3000);
  </script>
</body>
</html>
