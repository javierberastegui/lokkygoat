<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Ajustes de Lokkygoat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Outfit', system-ui, sans-serif;
    }

    #panel {
      width: calc(100vw - 18px);
      height: calc(100vh - 18px);
      margin: 9px;
      border-radius: 24px;
      background: rgba(15, 23, 42, .96);
      border: 1px solid rgba(168, 85, 247, .35);
      box-shadow: 0 24px 60px rgba(0,0,0,.45), 0 0 22px rgba(168,85,247,.18);
      color: #f9fafb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid rgba(148, 163, 184, .16);
      -webkit-app-region: drag;
    }

    #title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #d8b4fe;
    }

    #subtitle {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }

    #close {
      border: 1px solid rgba(244, 63, 94, .45);
      color: #fecdd3;
      background: rgba(127, 29, 29, .35);
      border-radius: 999px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.2s;
    }

    #close:hover {
      background: rgba(244, 63, 94, 0.6);
      color: white;
    }

    #content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Scrollbar design */
    #content::-webkit-scrollbar {
      width: 6px;
    }
    #content::-webkit-scrollbar-track {
      background: transparent;
    }
    #content::-webkit-scrollbar-thumb {
      background: rgba(168, 85, 247, 0.3);
      border-radius: 999px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #a855f7;
      margin-top: 6px;
      margin-bottom: 2px;
      border-bottom: 1px solid rgba(168, 85, 247, .2);
      padding-bottom: 4px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field.row {
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }

    label {
      font-size: 11px;
      color: #cbd5e1;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], input[type="password"], select {
      background: rgba(2, 6, 23, .55);
      border: 1px solid rgba(148, 163, 184, .2);
      color: #f8fafc;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }

    input[type="text"]:focus, input[type="password"]:focus, select:focus {
      border-color: rgba(168, 85, 247, .5);
      box-shadow: 0 0 8px rgba(168,85,247,0.25);
    }

    #save {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-family: inherit;
    }

    #save:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #save:active {
      transform: translateY(1px);
    }

    #save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #test-connection {
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #f8fafc;
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    #test-connection:hover {
      background: rgba(148, 163, 184, 0.2);
      border-color: rgba(168, 85, 247, .4);
      transform: translateY(-1px);
    }

    #test-connection:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div id="panel">
    <div id="header">
      <div>
        <div id="title">AJUSTES MASCOTA</div>
        <div id="subtitle">Personalización y Proveedor IA</div>
      </div>
      <button id="close" title="Cerrar">×</button>
    </div>
    <div id="content">
      <!-- Sección Mascota -->
      <div class="section-title">Personalización</div>

      <div class="field">
        <label>Nombre de la Cabra</label>
        <input type="text" id="conf-name" placeholder="Cabra" />
      </div>
      
      <div class="field">
        <label>Tamaño</label>
        <select id="conf-size">
          <option value="pequeño">Pequeño</option>
          <option value="normal">Normal</option>
          <option value="grande">Grande</option>
        </select>
      </div>
      
      <div class="field">
        <label>Velocidad de Movimiento</label>
        <select id="conf-speed">
          <option value="lenta">Lenta</option>
          <option value="normal">Normal</option>
          <option value="rápida">Rápida</option>
        </select>
      </div>
      
      <div class="field">
        <label>Tema (Color)</label>
        <select id="conf-theme">
          <option value="violeta">Violeta</option>
          <option value="verde">Verde</option>
          <option value="rojo">Rojo</option>
          <option value="neón">Neón</option>
        </select>
      </div>
      
      <div class="field row" style="margin-top: 4px; margin-bottom: 6px;">
        <input type="checkbox" id="conf-quiet" />
        <label for="conf-quiet" style="cursor:pointer; text-transform:none;">Modo Tranquilo (Flotar suavemente)</label>
      </div>

      <!-- Sección Conexión IA -->
      <div class="section-title">Conexión IA</div>

      <div class="field">
        <label>Proveedor IA</label>
        <select id="conf-provider">
          <option value="ollama">Ollama (Local)</option>
          <option value="openai">OpenAI (ChatGPT)</option>
          <option value="claude">Anthropic Claude</option>
          <option value="hermes">Hermes (Local Dashboard)</option>
          <option value="openclaw">OpenClaw</option>
          <option value="codex">Codex</option>
          <option value="custom">Personalizado (OpenAI compatible)</option>
        </select>
      </div>

      <div class="field" id="field-key">
        <label>API Key / Token</label>
        <input type="password" id="conf-key" placeholder="Clave secreta api" />
      </div>

      <div class="field" id="field-url">
        <label>API URL / Endpoint</label>
        <input type="text" id="conf-url" placeholder="http://127.0.0.1:11434" />
      </div>

      <div class="field" id="field-model">
        <label>Modelo IA</label>
        <input type="text" id="conf-model" placeholder="llama3" />
      </div>
      
      <div id="status" style="color:#22d3ee;font-size:12px;text-align:center;min-height:16px;margin-top:4px;word-break:break-all;"></div>
      
      <div style="display: flex; gap: 10px; margin-top: 6px; margin-bottom: 10px;">
        <button id="test-connection" style="flex: 1;">Probar Conexión</button>
        <button id="save" style="flex: 1;">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("close").addEventListener("click", () => {
      window.electronAPI?.settingsClose?.() || window.close();
    });

    let localConfig = {};
    let localProviders = {};
    let currentProvider = "";

    function toggleProviderFields() {
      const provider = document.getElementById("conf-provider").value;
      const keyField = document.getElementById("field-key");
      const urlField = document.getElementById("field-url");
      const modelField = document.getElementById("field-model");
      
      if (provider === "hermes") {
        keyField.style.display = "none";
        urlField.style.display = "flex";
        modelField.style.display = "none";
      } else if (provider === "ollama") {
        keyField.style.display = "none";
        urlField.style.display = "flex";
        modelField.style.display = "flex";
      } else if (provider === "openai" || provider === "claude") {
        keyField.style.display = "flex";
        urlField.style.display = "none";
        modelField.style.display = "flex";
      } else {
        // custom, openclaw, codex
        keyField.style.display = "flex";
        urlField.style.display = "flex";
        modelField.style.display = "flex";
      }
    }

    function loadProviderFields(provider) {
      currentProvider = provider;
      const provConf = localProviders[provider] || {};
      
      document.getElementById("conf-key").value = provConf.apiKey || "";
      document.getElementById("conf-url").value = provConf.apiUrl || "";
      document.getElementById("conf-model").value = provConf.model || "";
      
      // Auto-populate default fields if completely empty
      const keyInput = document.getElementById("conf-key");
      const urlInput = document.getElementById("conf-url");
      const modelInput = document.getElementById("conf-model");

      if (provider === "hermes" && !urlInput.value) {
        urlInput.value = "http://127.0.0.1:9119";
      } else if (provider === "ollama") {
        if (!urlInput.value) urlInput.value = "http://127.0.0.1:11434";
        if (!modelInput.value) modelInput.value = "llama3";
      } else if (provider === "openai" && !modelInput.value) {
        modelInput.value = "gpt-4o-mini";
      } else if (provider === "claude" && !modelInput.value) {
        modelInput.value = "claude-3-5-sonnet-latest";
      } else if (["openclaw", "codex", "custom"].includes(provider)) {
        if (!urlInput.value) urlInput.value = "http://127.0.0.1:8000/v1/chat/completions";
        if (!modelInput.value) modelInput.value = "default";
      }
      
      toggleProviderFields();
    }

    document.getElementById("conf-provider").addEventListener("change", (e) => {
      // Save current fields into old provider cache
      if (currentProvider) {
        localProviders[currentProvider] = {
          apiKey: document.getElementById("conf-key").value,
          apiUrl: document.getElementById("conf-url").value,
          model: document.getElementById("conf-model").value
        };
      }
      
      const newProv = e.target.value;
      loadProviderFields(newProv);
    });

    async function loadConfig() {
      try {
        if (!window.electronAPI || !window.electronAPI.getCompanionState) {
          console.error("electronAPI not available");
          return;
        }
        
        const state = await window.electronAPI.getCompanionState();
        localConfig = state.config || {};
        localProviders = localConfig.providers || {};
        
        document.getElementById("conf-name").value = localConfig.name || "Cabra";
        document.getElementById("conf-size").value = localConfig.size || "normal";
        document.getElementById("conf-speed").value = localConfig.movement_speed || "normal";
        document.getElementById("conf-theme").value = localConfig.theme || "violeta";
        document.getElementById("conf-quiet").checked = localConfig.quiet_mode || false;
        
        const activeProv = localConfig.provider || "ollama";
        document.getElementById("conf-provider").value = activeProv;
        
        loadProviderFields(activeProv);
      } catch (err) {
        console.error(err);
        document.getElementById("status").textContent = "Error al cargar configuración";
        document.getElementById("status").style.color = "#f43f5e";
      }
    }

    document.getElementById("test-connection").addEventListener("click", async () => {
      const statusEl = document.getElementById("status");
      statusEl.textContent = "Probando conexión...";
      statusEl.style.color = "#eab308";
      
      const provider = document.getElementById("conf-provider").value;
      const apiKey = document.getElementById("conf-key").value;
      const apiUrl = document.getElementById("conf-url").value;
      const model = document.getElementById("conf-model").value;
      
      try {
        if (!window.electronAPI || !window.electronAPI.testProviderConnection) {
          throw new Error("Canal de prueba no disponible.");
        }
        
        const result = await window.electronAPI.testProviderConnection({
          provider,
          apiKey,
          apiUrl,
          model
        });
        
        if (result.ok) {
          statusEl.textContent = "🟢 Conexión exitosa";
          statusEl.style.color = "#4ade80";
        } else {
          statusEl.textContent = "🔴 Error: " + result.error;
          statusEl.style.color = "#f43f5e";
        }
      } catch (err) {
        statusEl.textContent = "🔴 Error: " + err.message;
        statusEl.style.color = "#f43f5e";
      }
    });

    document.getElementById("save").addEventListener("click", async () => {
      const statusEl = document.getElementById("status");
      statusEl.textContent = "Guardando...";
      statusEl.style.color = "#22d3ee";
      const saveBtn = document.getElementById("save");
      saveBtn.disabled = true;

      try {
        // Save current fields into provider cache
        if (currentProvider) {
          localProviders[currentProvider] = {
            apiKey: document.getElementById("conf-key").value,
            apiUrl: document.getElementById("conf-url").value,
            model: document.getElementById("conf-model").value
          };
        }

        const payload = {
          name: document.getElementById("conf-name").value,
          size: document.getElementById("conf-size").value,
          movement_speed: document.getElementById("conf-speed").value,
          theme: document.getElementById("conf-theme").value,
          quiet_mode: document.getElementById("conf-quiet").checked,
          provider: document.getElementById("conf-provider").value,
          providers: localProviders
        };

        const ok = await window.electronAPI.saveCompanionConfig(payload);

        if (ok) {
          statusEl.textContent = "Guardado con éxito.";
          statusEl.style.color = "#4ade80";
          setTimeout(() => {
            if (window.electronAPI && window.electronAPI.settingsClose) {
              window.electronAPI.settingsClose();
            }
          }, 1000);
        } else {
          throw new Error("Respuesta de guardado fallida");
        }
      } catch (err) {
        statusEl.textContent = "Error al guardar.";
        statusEl.style.color = "#f43f5e";
        console.error(err);
      } finally {
        saveBtn.disabled = false;
      }
    });

    loadConfig();
  </script>
</body>
</html>
